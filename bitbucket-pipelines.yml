clone:
  depth: full

pipelines:
  branches:
    main:
      - step:
          name: Build & Deploy to Heroku (Django + React)
          image: atlassian/default-image:4
          caches:
            - pip
            - node
          script:
            # 1) フロント build
            - cd frontend
            - npm ci
            - npm run build
            - cd ..

            # 2) dist を Django の static 配下へコピー（配信したい場所に合わせて調整OK）
            - rm -rf backend/static/frontend
            - mkdir -p backend/static/frontend
            - cp -R frontend/dist/* backend/static/frontend/

            # 3) IMPORTANT: git archive ではなく、作業ツリーを丸ごと tar する（生成物を含めるため）
            - tar -czf app.tar.gz
              --exclude-vcs
              --exclude=app.tar.gz
              --exclude=frontend/node_modules
              --exclude=backend/.venv
              .

            # 4) Herokuへデプロイ
            - pipe: atlassian/heroku-deploy:0.1.1
              variables:
                HEROKU_API_KEY: $HEROKU_API_KEY
                HEROKU_APP_NAME: $HEROKU_APP_NAME
                ZIP_FILE: app.tar.gz

definitions:
  caches:
    pip: ~/.cache/pip
    node: ~/.npm

