clone:
  depth: full

pipelines:
  branches:
    main:
      - step:
          name: Build & Deploy to Heroku (reset)
          image: atlassian/default-image:4
          caches:
            - node
          script:
            - echo "PIPELINE RESET OK"
            - pwd
            - ls -lah

            # frontend build
            - cd frontend
            - npm ci
            - npm run build
            - cd ..

            # copy dist into backend static
            - rm -rf backend/static/frontend
            - mkdir -p backend/static/frontend
            - cp -R frontend/dist/* backend/static/frontend/

            # copy dist into backend
            - rm -rf backend/static/assets backend/templates/index.html
            - mkdir -p backend/static backend/templates

            - cp frontend/dist/index.html backend/templates/index.html
            - cp -R frontend/dist/assets backend/static/assets

            # create tarball OUTSIDE project dir
            - mkdir -p /tmp/pkg
            - tar -czf /tmp/pkg/app.tar.gz --exclude-vcs --exclude=frontend/node_modules --exclude=backend/.venv .
            - mv /tmp/pkg/app.tar.gz app.tar.gz
            - tar -tzf app.tar.gz | grep -E '^(\./)?Procfile$' || (echo "Procfile (capital P) not found in tar!" && exit 1)
            - tar -tzf app.tar.gz | head -n 30
            - ls -lah app.tar.gz

            # check required files exist inside tar
            - tar -tzf app.tar.gz | head -n 30
            - tar -tzf app.tar.gz | grep -E '^(requirements.txt|Procfile)$' || true

            # deploy to Heroku
            - pipe: atlassian/heroku-deploy:0.1.1
              variables:
                HEROKU_API_KEY: $HEROKU_API_KEY
                HEROKU_APP_NAME: $HEROKU_APP_NAME
                ZIP_FILE: app.tar.gz

definitions:
  caches:
    node: ~/.npm
