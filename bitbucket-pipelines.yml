clone:
  depth: full

pipelines:
  branches:
    main:
      - step:
          name: Build & Deploy to Heroku
          image: atlassian/default-image:4
          caches:
            - node
          script:
            - echo "PIPELINE OK"
            - pwd
            - ls -lah

            # frontend build (Vite)
            - cd frontend
            - npm ci
            - npm run build
            - cd ..

            # ===== Django serving setup =====
            # React index.html -> Django templates
            # Vite assets -> Django static (served via collectstatic/whitenoise)
            - rm -rf backend/templates/index.html backend/static/assets
            - mkdir -p backend/templates backend/static
            - cp frontend/dist/index.html backend/templates/index.html
            - cp -R frontend/dist/assets backend/static/assets

            # sanity check
            - test -f backend/templates/index.html || (echo "index.html not copied" && exit 1)
            - test -d backend/static/assets || (echo "assets not copied" && exit 1)
            - ls -lah backend/templates/index.html
            - ls -lah backend/static/assets | head -n 20

            # create tarball OUTSIDE project dir
            - mkdir -p /tmp/pkg
            - tar -czf /tmp/pkg/app.tar.gz --exclude-vcs --exclude=frontend/node_modules --exclude=backend/.venv .
            - mv /tmp/pkg/app.tar.gz app.tar.gz

            # check Procfile exists (capital P)
            - tar -tzf app.tar.gz | grep -E '^(\./)?Procfile$' || (echo "Procfile (capital P) not found in tar!" && exit 1)

            # quick peek
            - tar -tzf app.tar.gz | head -n 40
            - ls -lah app.tar.gz

            # deploy to Heroku
            - pipe: atlassian/heroku-deploy:0.1.1
              variables:
                HEROKU_API_KEY: $HEROKU_API_KEY
                HEROKU_APP_NAME: $HEROKU_APP_NAME
                ZIP_FILE: app.tar.gz

definitions:
  caches:
    node: ~/.npm
